<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 16px; font-weight: 600; color: #10b981; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #1e293b;
      border-radius: 8px;
      font-size: 13px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #10b981; box-shadow: 0 0 6px #10b98180; }
    .status-dot.disconnected { background: #ef4444; }
    .status-dot.checking { background: #fbbf24; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.5; } }
    label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 4px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #10b981; }
    input::placeholder { color: #64748b; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #10b981;
      color: #fff;
    }
    .btn-primary:hover { background: #059669; }
    .btn-secondary {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      margin-top: 8px;
    }
    .btn-secondary:hover { background: #334155; color: #e2e8f0; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .section { margin-bottom: 16px; }
    .divider {
      text-align: center;
      color: #475569;
      font-size: 11px;
      margin: 12px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #334155;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .login-section, .token-section, .logged-in-section { display: none; }
    .login-section.active, .token-section.active, .logged-in-section.active { display: block; }
    .msg {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-top: 8px;
      display: none;
    }
    .msg.error { display: block; background: #7f1d1d40; color: #fca5a5; }
    .msg.success { display: block; background: #064e3b40; color: #6ee7b7; }
    .user-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-info span { font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="header">
    <div style="width:28px;height:28px;background:#10b981;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;">📌</div>
    <h1>ClipMark</h1>
  </div>

  <div class="status-row">
    <div id="statusDot" class="status-dot checking"></div>
    <span id="statusText">Checking connection...</span>
  </div>

  <!-- Logged in state -->
  <div id="loggedInSection" class="logged-in-section">
    <div class="user-info">
      <span>👤 <span id="usernameDisplay"></span></span>
    </div>
    <button id="logoutBtn" class="btn btn-secondary">Log out</button>
  </div>

  <!-- Login form -->
  <div id="loginSection" class="login-section">
    <div class="section">
      <label for="serverUrl">Server URL</label>
      <input type="url" id="serverUrl" placeholder="https://clipmark.top" value="https://clipmark.top">
    </div>
    <div class="section">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Your ClipMark username">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Your password">
      <button id="loginBtn" class="btn btn-primary">Log in</button>
    </div>
    <div class="divider">or</div>
    <div class="section">
      <label for="tokenInput">Auth Token (manual)</label>
      <input type="text" id="tokenInput" placeholder="Paste bearer token">
      <button id="saveTokenBtn" class="btn btn-secondary">Save Token</button>
    </div>
    <div id="loginMsg" class="msg"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
